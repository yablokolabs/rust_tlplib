name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85"
          components: clippy
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run clippy (serde feature)
        run: cargo clippy --all-targets --features serde -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85"
      - name: Run tests
        run: cargo test --verbose
      - name: Run tests (serde feature)
        run: cargo test --verbose --features serde

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85"
      - name: Build (MSRV)
        run: cargo build
      - name: Test (MSRV)
        run: cargo test
